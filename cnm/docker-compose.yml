version: '3.9'

services:
  cnm-api:
    build:
      context: .
      dockerfile: src/EthosCn.Api/Dockerfile
    ports:
      - "9501:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CnmDb=${CNM_DB_CONNECTION_STRING}
      - ColleagueWebApi__BaseUrl=${COLLEAGUE_API_URL}
      - ColleagueWebApi__Username=${COLLEAGUE_API_USERNAME}
      - ColleagueWebApi__Password=${COLLEAGUE_API_PASSWORD}
      - AzureAd__Authority=${AZURE_AD_AUTHORITY}
      - AzureAd__Audience=${AZURE_AD_AUDIENCE}
    depends_on:
      - cnm-db

  cnm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - cnm-api

  cnm-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - cnm-db-data:/var/opt/mssql

volumes:
  cnm-db-data:
