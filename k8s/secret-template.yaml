# DO NOT commit real values here.
# Copy to secret.yaml (gitignored), fill in base64-encoded values, then:
#   kubectl apply -f k8s/secret.yaml
#
# Or manage via the cluster's existing secret mechanism (Vault, Sealed Secrets, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: cnm-secrets
  namespace: cnm
type: Opaque
data:
  # echo -n 'value' | base64
  ConnectionStrings__CnmDb: ""
  ColleagueWebApi__BaseUrl: ""
  ColleagueWebApi__Username: ""
  ColleagueWebApi__Password: ""
  AzureAd__Authority: ""
  AzureAd__Audience: ""
