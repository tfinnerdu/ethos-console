# DO NOT commit real values.
# Copy to secret.yaml (gitignored), fill in base64-encoded values, apply:
#   kubectl apply -f k8s/secret.yaml -n cnm-dev
#
# Check secretKeyRef indentation carefully -- name and key must indent under secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: cnm-secrets
  namespace: cnm-dev
type: Opaque
data:
  # echo -n 'plaintext' | base64
  ConnectionStrings__CnmDb: ""
  ColleagueWebApi__BaseUrl: ""
  ColleagueWebApi__Username: ""
  ColleagueWebApi__Password: ""
  AzureAd__Authority: ""
  AzureAd__Audience: ""
