apiVersion: apps/v1
kind: Deployment
metadata:
  name: ethos-console
  namespace: ethos-console-prod
  labels:
    app: ethos-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ethos-console
  template:
    metadata:
      labels:
        app: ethos-console
    spec:
      containers:
        - name: ethos-console
          image: doaneu/ethos-console:latest
          ports:
            - containerPort: 8080
          env:
            - name: FLASK_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: CONDUCTOR_URL
              value: "https://du-int.doane.edu/prod/conductor"
          envFrom:
            - secretRef:
                name: ethos-console-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
