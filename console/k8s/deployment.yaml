apiVersion: apps/v1
kind: Deployment
metadata:
  name: ethos-console
  namespace: ethos-console-prod
  labels:
    app: ethos-console
spec:
  replicas: 1
  # Recreate (not the default RollingUpdate): at replicas: 1, RollingUpdate
  # tries to start the new pod before killing the old one, which deadlocks
  # if DATABASE_URL points at the optional SQLite-on-PVC volume below (a
  # ReadWriteOnce PVC can only be mounted by one pod at a time). Harmless
  # either way — replicas: 1 already means a brief gap per redeploy.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ethos-console
  template:
    metadata:
      labels:
        app: ethos-console
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: ethos-console
          image: doaneu/ethos-console:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: FLASK_ENV
              value: production
            - name: PORT
              value: "8080"
            # Must match k8s/ingress.yaml's stripPrefix path — the browser
            # addresses this app at that full path even though Flask itself
            # (behind the stripped prefix) never sees it. Scopes the session
            # cookie away from sibling apps at their own prod/{appname}
            # paths on the same origin. See config.py's SESSION_COOKIE_PATH.
            - name: SESSION_COOKIE_PATH
              value: "/prod/ethos-console"
            - name: CONDUCTOR_URL
              value: "https://du-int.doane.edu/prod/conductor"
            # Extra hostnames the Replay UI's per-run conductor_url override
            # is allowed to target, beyond CONDUCTOR_URL's own host above —
            # comma-separated, e.g. "du-test.doane.edu". Leave empty unless
            # operators need to point Replay at another Conductor instance;
            # see app/conductor_client.py for why this is allow-listed.
            - name: CONDUCTOR_ADDITIONAL_HOSTS
              value: ""
          envFrom:
            - secretRef:
                name: ethos-console-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          # volumeMounts:
          #   - name: sqlite-data
          #     mountPath: /data

        # ── SQLite-on-PVC option (alternative to Postgres) ──────────────
        # Uncomment this container, the volumeMounts entry above, and the
        # volumes block below; apply k8s/pvc.yaml; set DATABASE_URL to an
        # absolute path under /data (e.g. /data/ethos_console.db — see
        # secret-template.yaml). This sidecar runs nothing but a shell —
        # its only purpose is `kubectl exec` access to inspect the live
        # db file (e.g. `apk add sqlite && sqlite3
        # /data/ethos_console.db ...`) without exec'ing into the app
        # container's own image.
        # - name: sqlite-data
        #   image: alpine:3.20
        #   command: ["sleep", "infinity"]
        #   volumeMounts:
        #     - name: sqlite-data
        #       mountPath: /data
        #   resources:
        #     requests:
        #       cpu: "10m"
        #       memory: "16Mi"
        #     limits:
        #       cpu: "50m"
        #       memory: "32Mi"
      # volumes:
      #   - name: sqlite-data
      #     persistentVolumeClaim:
      #       claimName: ethos-console-sqlite-data
