apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ethos-console
  namespace: ethos-console-prod
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: prod-letsencrypt
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: ethos-console-prod-strip-prefix@kubernetescrd
spec:
  rules:
    - host: du-int.doane.edu
      http:
        paths:
          - path: /prod/ethos-console
            pathType: Prefix
            backend:
              service:
                name: ethos-console
                port:
                  number: 80
  tls:
    - hosts:
        - du-int.doane.edu
      secretName: wildcard-doane-tls

---
# Referenced by this Ingress's router.middlewares annotation above — Traefik's
# kubernetescrd provider resolves cross-resource middleware references as
# "<namespace>-<name>@kubernetescrd", so this object's name/namespace must be
# exactly "strip-prefix" / "ethos-console-prod" for that reference to resolve.
# Strips /prod/ethos-console before forwarding, so Flask sees clean root-
# relative paths (matches app/auth.py's own path checks and every url_for()
# call, none of which know about the ingress prefix).
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
  namespace: ethos-console-prod
spec:
  stripPrefix:
    prefixes:
      - /prod/ethos-console
