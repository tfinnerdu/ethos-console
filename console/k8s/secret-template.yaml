apiVersion: v1
kind: Secret
metadata:
  name: ethos-console-secrets
  namespace: ethos-console-prod
type: Opaque
stringData:
  ETHOS_API_KEY: "REPLACE_ME"
  CONDUCTOR_API_KEY: "REPLACE_ME"
  # Console auth key — set to a shared passphrase for the dev team.
  # Tip: reuse CONDUCTOR_API_KEY value here for single sign-on with Conductor.
  CONSOLE_KEY: "REPLACE_ME"
  # DATABASE_URL MUST be PostgreSQL in k8s — SQLite does not survive pod restarts.
  # All mnemonics, resource annotations, saved queries, and error log live here.
  DATABASE_URL: "postgresql://user:pass@postgres-host:5432/ethos_console"
  SECRET_KEY: "REPLACE_ME_WITH_RANDOM_64_CHAR_STRING"
  # UNIDATA_CONN_STR: "Driver={...};Server=...;..."  # optional, enables Phase 3 features
  # CN Monitor tab — point at your CNM service and supply a Bearer token for prod auth.
  # Leave CNM_API_KEY blank if CNM is configured to use DevAuth (local dev only).
  # CNM_BASE_URL: "https://your-host/prod/cnm"
  # CNM_API_KEY: "REPLACE_ME_WITH_AZURE_AD_TOKEN"
