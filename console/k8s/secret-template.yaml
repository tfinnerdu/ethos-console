apiVersion: v1
kind: Secret
metadata:
  name: ethos-console-secrets
  namespace: ethos-console-prod
type: Opaque
stringData:
  # At least one Ethos environment is required. Add ethosEnv2*/ethosEnv3*
  # blocks to expose the nav-bar environment switcher.
  ethosEnv1Name: "Prod"
  ethosEnv1URL: "https://integrate.elluciancloud.com"
  ethosEnv1Key: "REPLACE_ME"
  # Optional — set only when the bus key doesn't have GraphQL scope.
  # ethosEnv1GraphQLKey: "REPLACE_ME"
  # ethosEnv2Name: "Test"
  # ethosEnv2URL: "https://integrate.elluciancloud.com"
  # ethosEnv2Key: "REPLACE_ME"
  # ethosEnv2GraphQLKey: "REPLACE_ME"
  # ethosEnv3Name: "Dev"
  # ethosEnv3URL: "https://integrate.elluciancloud.com"
  # ethosEnv3Key: "REPLACE_ME"
  # ethosEnv3GraphQLKey: "REPLACE_ME"
  # Preselect this env on startup. Optional when only one env is configured.
  defaultEnv: "Prod"
  # Optional — used by the Replayer and DOB Repair's auto-apply workflow
  # trigger. Leave unset to keep both features off.
  # conductorAPIKey: "REPLACE_ME"
  # DATABASE_URL — a relative path (or relative-path sqlite:// URL) is
  # refused at boot in production (it lives in the container's ephemeral
  # filesystem and vanishes on every redeploy). Use Postgres, as below, or —
  # matching the DLM service's proven pattern — SQLite on a mounted
  # PersistentVolumeClaim at an ABSOLUTE path, e.g. "/data/ethos_console.db"
  # (a plain path is fine — the app builds the sqlite:/// URI itself), with
  # the Deployment set to replicas: 1 / strategy: Recreate (SQLite can't be
  # safely shared across multiple pods/writers) — see
  # k8s/ethos-console.yaml's commented-out volumeMounts/volumes for that path.
  # All mnemonics, resource annotations, saved queries, and error log live here.
  databaseURL: "postgresql://user:pass@postgres-host:5432/ethos_console"
  # Also signs the login session cookie above — a default/known value here
  # lets anyone forge a valid session, bypassing authUsername/authPassword
  # entirely. Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  secretKey: "REPLACE_ME_WITH_RANDOM_64_CHAR_STRING"
  # Single-credential login gate (app/auth.py) — gates every route except
  # health checks. FAIL-CLOSED: leaving either unset blocks the whole app,
  # it does not open it up (unless Entra, below, is configured instead).
  # See docs/auth-gate-guide.md.
  authUsername: "REPLACE_ME"
  authPassword: "REPLACE_ME"
  # Entra ID (Azure AD) SSO — optional. When all four are set, the login
  # gate auto-redirects to Microsoft's sign-in page instead of the local
  # form above (which stays reachable directly at /login as a fallback).
  # entraTenantID: "REPLACE_ME"
  # entraClientID: "REPLACE_ME"
  # entraClientSecret: "REPLACE_ME"
  # entraRedirectURI: "https://du-int.doane.edu/prod/ethos-console/api/v1/auth/callback"
  # colleagueWebAPIURL / colleagueWebAPIUser / colleagueWebAPIPass —
  # populate to enable the Colleague API tab and the CN Monitor reads
  # (these now run in-process, there's no separate CNM service to point
  # at). URL must include the IIS site's own path — confirmed against a
  # real, working request that routes hang directly off it with no
  # additional "/api/" segment.
  # colleagueWebAPIURL: "https://cwsprod.doane.local:8183/ColleagueAPI"
  # colleagueWebAPIUser: "REPLACE_ME"
  # colleagueWebAPIPass: "REPLACE_ME"
  # unidataHost / unidataPort / unidataUser / unidataPassword /
  # unidataAccount — populate to enable Phase 3 (UniData Direct Query /
  # Field Diff). See app/unidata_client.py's UnidataClient.
  # unidataHost: "unidata.doane.edu"
  # unidataPort: "31438"
  # unidataUser: "REPLACE_ME"
  # unidataPassword: "REPLACE_ME"
  # unidataAccount: "REPLACE_ME"
  # DOB Repair SQL fetch source (app/dob_sql_source.py) — optional,
  # alternative to CSV upload. dobReconcileDB is a complete ODBC connection
  # string (this app never assembles one from parts) — grant its DB login
  # SELECT-only permission; see warning in docs/console-user-guide.md's DOB
  # Repair section.
  # dobReconcileSQLFile: "/app/dob_reconcile_query.sql"
  # dobReconcileDB: "DRIVER={ODBC Driver 17 for SQL Server};Server=sqlserver.doane.edu;Database=ODS;UId=REPLACE_ME;PWD=REPLACE_ME;Encrypt=yes;TrustServerCertificate=yes"
  # Bus Monitor alerting (app/bus_monitor.py) — optional. A Teams
  # (webhook.office.com) or Slack/generic incoming webhook URL; anyone who
  # has it can post to that channel, so it's kept here rather than as a
  # plain value in k8s/ethos-console.yaml. Turns on silence + error-spike
  # alerts; leave unset (the default) to keep alerting off.
  # busAlertWebhookURL: "https://REPLACE_ME.webhook.office.com/..."
