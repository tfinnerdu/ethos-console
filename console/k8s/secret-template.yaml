apiVersion: v1
kind: Secret
metadata:
  name: ethos-console-secrets
  namespace: ethos-console-prod
type: Opaque
stringData:
  # At least one Ethos environment is required. Add ETHOS_ENV_2_* / ETHOS_ENV_3_*
  # blocks to expose the nav-bar environment switcher.
  ETHOS_ENV_1_NAME: "Prod"
  ETHOS_ENV_1_URL: "https://integrate.elluciancloud.com"
  ETHOS_ENV_1_KEY: "REPLACE_ME"
  # Optional — set only when the bus key doesn't have GraphQL scope.
  # ETHOS_ENV_1_GRAPHQL_KEY: "REPLACE_ME"
  # Preselect this env on startup. Optional when only one env is configured.
  DEFAULT_ENV: "Prod"
  CONDUCTOR_API_KEY: "REPLACE_ME"
  # Single-credential login gate (app/auth.py) — gates every route except
  # health checks. FAIL-CLOSED: leaving either unset blocks the whole app,
  # it does not open it up (unless Entra, below, is configured instead).
  # See docs/auth-gate-guide.md.
  AUTH_USERNAME: "REPLACE_ME"
  AUTH_PASSWORD: "REPLACE_ME"
  # Entra ID (Azure AD) SSO — optional. When all four are set, the login
  # gate auto-redirects to Microsoft's sign-in page instead of the local
  # form above (which stays reachable directly at /login as a fallback).
  # ENTRA_TENANT_ID: "REPLACE_ME"
  # ENTRA_CLIENT_ID: "REPLACE_ME"
  # ENTRA_CLIENT_SECRET: "REPLACE_ME"
  # ENTRA_REDIRECT_URI: "https://du-int.doane.edu/prod/ethos-console/api/v1/auth/callback"
  # DATABASE_URL MUST be PostgreSQL in k8s — SQLite does not survive pod restarts.
  # All mnemonics, resource annotations, saved queries, and error log live here.
  DATABASE_URL: "postgresql://user:pass@postgres-host:5432/ethos_console"
  # Also signs the login session cookie above — a default/known value here
  # lets anyone forge a valid session, bypassing AUTH_USERNAME/AUTH_PASSWORD
  # entirely. Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "REPLACE_ME_WITH_RANDOM_64_CHAR_STRING"
  # UNIDATA_HOST / _USER / _PASSWORD / _ACCOUNT — populate to enable Phase 3
  # (UniData Direct Query / Field Diff). See console.py's UnidataClient.
  # UNIDATA_HOST: "unidata.doane.edu"
  # UNIDATA_PORT: "31438"
  # UNIDATA_USER: "REPLACE_ME"
  # UNIDATA_PASSWORD: "REPLACE_ME"
  # UNIDATA_ACCOUNT: "REPLACE_ME"
  # COLLEAGUE_WEB_API_URL / _USER / _PASS — populate to enable the
  # Colleague API tab and the CN Monitor reads (these now run in-process,
  # there's no separate CNM service to point at).
  # COLLEAGUE_WEB_API_URL: "https://colleague-webapi.doane.edu"
  # COLLEAGUE_WEB_API_USER: "REPLACE_ME"
  # COLLEAGUE_WEB_API_PASS: "REPLACE_ME"
  # DOB Repair SQL fetch source (app/dob_sql_source.py) — optional, alternative
  # to CSV upload. DOB_RECONCILE_DB is a complete ODBC connection string (this
  # app never assembles one from parts) — grant its DB login SELECT-only
  # permission; see warning in docs/console-user-guide.md's DOB Repair section.
  # DOB_RECONCILE_SQL_FILE: "/app/dob_reconcile_query.sql"
  # DOB_RECONCILE_DB: "DRIVER={ODBC Driver 17 for SQL Server};Server=sqlserver.doane.edu;Database=ODS;UId=REPLACE_ME;PWD=REPLACE_ME;Encrypt=yes;TrustServerCertificate=yes"
