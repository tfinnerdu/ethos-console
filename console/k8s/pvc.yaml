# Optional — only apply this if DATABASE_URL is set to an absolute path
# (e.g. /data/ethos_console.db — see the DATABASE_URL comment in
# secret-template.yaml) instead of Postgres. Skip this file entirely if
# using Postgres, which remains the default.
#
# ReadWriteOnce means this volume can only be mounted by one node/pod at a
# time — fine here because deployment.yaml pins the Deployment to
# replicas: 1 with strategy: Recreate, so there's never more than one pod
# trying to mount it at once.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ethos-console-sqlite-data
  namespace: ethos-console-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
