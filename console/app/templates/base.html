<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doane Ethos Dev Console{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- Top navbar -->
<nav class="navbar navbar-expand-lg navbar-dark doane-nav px-3">
  <a class="navbar-brand fw-bold" href="/">
    <span class="doane-dot"></span>Doane Ethos Dev Console
  </a>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="badge env-badge">{{ config.get('ENV', 'development')|upper }}</span>
    <a href="/health" class="nav-link text-white-50 small">
      <i class="bi bi-heart-pulse me-1"></i>Health
    </a>
  </div>
</nav>

<!-- Tab bar -->
<div class="tab-bar">
  <div class="container-fluid px-3 d-flex gap-1">
    <a href="/"          class="tab-item {% if active_tab == 'bus' %}active{% endif %}">
      <i class="bi bi-broadcast me-1"></i>Bus Monitor
    </a>
    <a href="/replay"    class="tab-item {% if active_tab == 'replay' %}active{% endif %}">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Replay
    </a>
    <a href="/graphql"   class="tab-item {% if active_tab == 'graphql' %}active{% endif %}">
      <i class="bi bi-braces me-1"></i>GraphQL
    </a>
    <a href="/resources" class="tab-item {% if active_tab == 'resources' %}active{% endif %}">
      <i class="bi bi-grid-3x3-gap me-1"></i>Resources
    </a>
    <a href="/mnemonics" class="tab-item {% if active_tab == 'mnemonics' %}active{% endif %}">
      <i class="bi bi-book me-1"></i>Mnemonics
    </a>
    <a href="/health"    class="tab-item {% if active_tab == 'health' %}active{% endif %}">
      <i class="bi bi-activity me-1"></i>Health
    </a>
  </div>
</div>

<!-- Page content -->
<main class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
