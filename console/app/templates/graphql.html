{% extends "base.html" %}
{% block title_suffix %} — GraphQL{% endblock %}

{% block content %}
<div class="row g-2" style="height:calc(100vh - 135px); min-height:640px;">

  <!-- Schema explorer -->
  <div class="col-12 col-md-3 d-flex flex-column">
    <div class="console-card flex-fill d-flex flex-column" style="overflow:hidden; min-height:0;">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="console-card-header mb-0">Schema Explorer</div>
        <button class="btn btn-xs-icon" onclick="loadSchema()" id="btn-load-schema" title="Load schema">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
      <div class="input-group input-group-sm mb-2">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" id="schema-search" class="form-control"
               placeholder="Filter types..." oninput="filterSchema()" />
      </div>
      <div id="schema-status" class="small text-muted mb-1"></div>
      <div id="schema-tree" class="schema-tree flex-fill" style="overflow-y:auto; min-height:0;">
        <button class="btn btn-sm btn-doane w-100 mt-2" onclick="loadSchema()">
          <i class="bi bi-download me-1"></i>Load Schema from Ethos
        </button>
      </div>
    </div>
  </div>

  <!-- Editor + results -->
  <div class="col-12 col-md-9 d-flex flex-column gap-2">

    <!-- Saved queries chips -->
    <div class="console-card py-2">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="small fw-semibold text-muted text-nowrap">Saved:</span>
        <div id="saved-chips" class="d-flex gap-1 flex-wrap flex-fill">
          <span class="text-muted small">Loading...</span>
        </div>
        <div class="ms-auto d-flex gap-1">
          <button class="btn btn-xs-icon" onclick="clearQuery()" title="Clear">
            <i class="bi bi-x-circle"></i>
          </button>
          <button class="btn btn-sm btn-doane" onclick="openSaveModal()">
            <i class="bi bi-bookmark-plus me-1"></i>Save
          </button>
        </div>
      </div>
    </div>

    <!-- Query editor + variables (top half) -->
    <div class="row g-2" style="flex:1; min-height:0;">
      <div class="col-8 d-flex flex-column">
        <div class="console-card flex-fill d-flex flex-column" style="min-height:0;">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <div class="console-card-header mb-0">Query</div>
            <div class="d-flex gap-1">
              <button class="btn btn-xs-icon" onclick="copyCurl()" title="Copy as curl">
                <i class="bi bi-terminal"></i>
              </button>
              <button class="btn btn-sm btn-doane px-3" id="btn-run" onclick="runQuery()">
                <i class="bi bi-play-fill me-1"></i>Run
              </button>
            </div>
          </div>
          <textarea id="query-editor" class="form-control font-monospace flex-fill"
                    style="resize:none; font-size:0.78rem; min-height:180px;"
                    spellcheck="false" placeholder="query { }"></textarea>
        </div>
      </div>
      <div class="col-4 d-flex flex-column">
        <div class="console-card flex-fill d-flex flex-column" style="min-height:0;">
          <div class="console-card-header">Variables</div>
          <textarea id="vars-editor" class="form-control font-monospace flex-fill"
                    style="resize:none; font-size:0.78rem; min-height:150px;"
                    spellcheck="false" placeholder="{}">{}</textarea>
        </div>
      </div>
    </div>

    <!-- Result (bottom half) -->
    <div class="console-card d-flex flex-column" style="flex:1; min-height:0;">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <div class="console-card-header mb-0">Result</div>
        <div class="d-flex gap-2 align-items-center">
          <span id="result-meta" class="small text-muted"></span>
          <button class="btn btn-xs-icon" id="btn-copy-result" onclick="copyResult()" disabled title="Copy result">
            <i class="bi bi-clipboard"></i>
          </button>
        </div>
      </div>
      <div class="json-block flex-fill" id="result-display" style="max-height:220px; overflow-y:auto;">
        Run a query to see results.
      </div>
    </div>
  </div>
</div>

<!-- Save modal -->
<div class="modal fade" id="saveModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Save Query</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <label class="form-label">Name *</label>
          <input type="text" class="form-control" id="save-name" placeholder="e.g. Get person by ID" />
        </div>
        <div class="mb-2">
          <label class="form-label">Description</label>
          <input type="text" class="form-control" id="save-desc" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-doane" onclick="saveCurrentQuery()">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block head %}
<style>
.btn-xs-icon {
  background: none; border: 1px solid #dee2e6; border-radius: 4px;
  padding: 2px 6px; cursor: pointer; color: #6c757d;
}
.btn-xs-icon:hover { background: #f8f9fa; color: #212529; }
.schema-resource-header {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; cursor: pointer; border-radius: 4px;
  font-size: .8rem; font-weight: 600; color: var(--doane-navy);
}
.schema-resource-header:hover { background: #f0f4ff; }
.schema-field-row {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 6px 2px 20px; cursor: pointer; border-radius: 3px;
  font-size: .75rem;
}
.schema-field-row:hover { background: #f8f9fa; }
.schema-field-row input[type=checkbox] { cursor: pointer; accent-color: var(--doane-orange); }
.field-type-badge { color: #6c757d; font-size: .68rem; font-family: monospace; }
.chip-saved {
  background: #e8f4fd; color: #0c5460; border: 1px solid #b8daff;
  border-radius: 12px; padding: 2px 10px; font-size: .73rem; cursor: pointer;
  white-space: nowrap; display: inline-flex; align-items: center; gap: 4px;
}
.chip-saved:hover { background: #cce5ff; }
.chip-saved.preloaded { background: #fff3cd; border-color: #ffc107; color: #856404; }
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/graphql_builder.js"></script>
{% endblock %}
