<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doane Ethos Dev Console — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body style="background:#f4f5f7;display:flex;align-items:center;justify-content:center;min-height:100vh">
<div style="width:100%;max-width:380px;padding:0 16px">
  <div class="text-center mb-4">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:6px">
      <span class="doane-dot" style="width:14px;height:14px"></span>
      <span style="font-weight:700;font-size:1.1rem;color:#1F3864">Doane Ethos Dev Console</span>
    </div>
    <div class="text-muted small">Internal developer tool</div>
  </div>

  <div class="console-card">
    {% if not_configured %}
    <div class="alert alert-warning small py-2 mb-0">
      <i class="bi bi-exclamation-triangle me-1"></i>
      <strong>Authentication is not configured on this deployment.</strong>
      Contact an administrator.
    </div>
    {% else %}
    <h6 class="fw-semibold mb-3" style="color:#1F3864">Sign in</h6>
    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('auth.login_page') }}">
      <input type="hidden" name="next" value="{{ next or '/' }}" />
      <div class="mb-3">
        <label class="form-label small text-muted mb-1" for="login-username">Username</label>
        <input type="text" class="form-control" id="login-username" name="username"
               autocomplete="username" autofocus required />
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted mb-1" for="login-password">Password</label>
        <input type="password" class="form-control" id="login-password" name="password"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-doane w-100">Sign in</button>
    </form>
    {% endif %}
  </div>
</div>
</body>
</html>
